name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  pull_request:
    branches: [main, develop]
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_CACHE: true
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"

jobs:
  lint-typecheck-test:
    name: 1. Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: 1.1 Checkout Code
        uses: actions/checkout@v4

      - name: 1.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 1.3 Install Dependencies
        run: npm ci --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci

      - name: 1.4 Lint
        run: npx eslint app src --max-warnings=0

      - name: 1.5 TypeScript Check
        run: npx tsc --noEmit --incremental

      - name: 1.6 Run Tests
        run: npm test -- --coverage --ci

  build-android:
    name: 2. Build Android APK
    needs: lint-typecheck-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: 2.1 Checkout Code
        uses: actions/checkout@v4

      - name: 2.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 2.3 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 2.4 Install Dependencies
        run: npm ci --omit=dev --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci --omit=dev

      - name: 2.5 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN || '' }}

      # Cache the prebuild output — skip expensive prebuild when app.json/package.json haven't changed
      - name: 2.6 Cache Prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android/
          key: prebuild-${{ hashFiles('app.json', 'package-lock.json', 'src/db/database.native.ts') }}

      - name: 2.7 Pre-build (Android)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --non-interactive

      - name: 2.7.5 Generate Debug Keystore (Fallback)
        run: |
          if [ ! -f "android/app/debug.keystore" ]; then
            keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      # Cache Gradle build outputs for faster recompilation
      - name: 2.8 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 2.9 Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --max-workers=2 \
            --build-cache

      - name: 2.10 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: productive-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 14