name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agents/**'
      - 'ss/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agents/**'
      - 'ss/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  lint-typecheck-test:
    name: Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Lint
        run: npx eslint app src --max-warnings=0

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test -- --coverage --ci

      - name: Dependency Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  build-android:
    name: Build Android APK
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ndk-version: [ '27.0.11902837' ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/caches
            ${{ github.workspace }}/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies (production only)
        run: npm ci --omit=dev --no-audit --prefer-offline

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK
        run: |
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ matrix.ndk-version }}" >> $ANDROID_HOME/local.properties

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: false

      - name: Pre-build setup
        run: |
          npx expo prebuild --platform android --non-interactive --clean

      - name: Build Android APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --max-workers=4 \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            -Dorg.gradle.workers.max=4

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: productive-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: ignore
