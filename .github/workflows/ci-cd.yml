name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  pull_request:
    branches: [main, develop]
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_CACHE: true
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true"

jobs:
  lint-typecheck-test:
    name: 1. Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: 1.1 Checkout Code
        uses: actions/checkout@v4

      - name: 1.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 1.3 Install Dependencies
        run: npm ci --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci

      - name: 1.4 Lint
        run: npx eslint app src --max-warnings=0

      - name: 1.5 TypeScript Check
        run: npx tsc --noEmit --incremental

      - name: 1.6 Run Tests
        run: npm test -- --coverage --ci

  build-android:
    name: 2. Build Android APK
    needs: lint-typecheck-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: 2.1 Checkout Code
        uses: actions/checkout@v4

      - name: 2.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 2.3 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 2.4 Install Dependencies
        run: npm ci --omit=dev --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci --omit=dev

      - name: 2.5 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN || '' }}

      - name: 2.6 Cache Prebuild
        id: prebuild-cache
        uses: actions/cache@v4
        with:
          path: android/
          key: prebuild-${{ hashFiles('app.json', 'package-lock.json', 'src/db/database.native.ts') }}

      - name: 2.7 Pre-build (Android)
        if: steps.prebuild-cache.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --non-interactive

      - name: 2.7.5 Decode Signing Keystore
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > android/app/release.jks
          fi

      - name: 2.8 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 2.9 Build APK (Release)
        working-directory: ./android
        env:
          MYAPP_RELEASE_STORE_FILE: release.jks
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # Always pass signing properties; Gradle will handle fallback if properties are missing
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$MYAPP_RELEASE_STORE_FILE \
            -Pandroid.injected.signing.store.password=$MYAPP_RELEASE_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$MYAPP_RELEASE_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$MYAPP_RELEASE_KEY_PASSWORD \
            --no-daemon --parallel --max-workers=2 --build-cache

      - name: 2.10 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: productive-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 14

  create-release:
    name: 3. Create GitHub Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 3.1 Checkout Code
        uses: actions/checkout@v4

      - name: 3.2 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: productive-release-apk
          path: release-assets

      - name: 3.3 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}