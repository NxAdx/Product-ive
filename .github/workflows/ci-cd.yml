name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agents/**'
      - 'ss/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agents/**'
      - 'ss/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  EXPO_CACHE: true
  GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"

jobs:
  lint-typecheck-test:
    name: Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (fast)
        run: npm ci --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci

      - name: Lint
        run: npx eslint app src --max-warnings=0

      - name: TypeScript Check
        run: npx tsc --noEmit --incremental

      - name: Run Tests
        run: npm test -- --coverage --ci

      - name: Dependency Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  build-android:
    name: Build Android APK (Optimized)
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ndk-version: [ '27.0.11902837' ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore Gradle cache (Build)
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/caches
            ${{ github.workspace }}/.gradle/wrapper
            ${{ github.workspace }}/.gradle/build-cache
          key: gradle-build-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            gradle-build-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Restore Gradle cache (Configuration)
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/nonafs
          key: gradle-config-${{ runner.os }}-${{ hashFiles('**/gradle/**') }}
          restore-keys: |
            gradle-config-${{ runner.os }}-

      - name: Cache Java/Gradle state
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-home-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            gradle-home-${{ runner.os }}-

      - name: Install dependencies (production, optimized)
        run: npm ci --omit=dev --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci --omit=dev

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK (cached)
        run: |
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ matrix.ndk-version }}" >> $ANDROID_HOME/local.properties
          # Pre-cache NDK to avoid re-downloading
          export ANDROID_NDK=$ANDROID_HOME/ndk/${{ matrix.ndk-version }}
          if [ ! -d "$ANDROID_NDK" ]; then
            echo "Installing NDK..."
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ matrix.ndk-version }}"
          fi

      - name: Setup Expo (with caching)
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN || '' }}

      - name: Pre-build setup (incremental)
        run: |
          # Skip clean rebuild if modules cache exists
          if [ ! -d "node_modules" ]; then
            npx expo prebuild --platform android --non-interactive --clean
          else
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Build Android APK (Release, Optimized)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --max-workers=4 \
            --build-cache


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: productive-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: ignore