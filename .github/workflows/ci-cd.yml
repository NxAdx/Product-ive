name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  pull_request:
    branches: [main, develop]
    paths-ignore: [ 'docs/**', '.agents/**', 'ss/**' ]
  workflow_dispatch: # Manual trigger from Actions tab

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  EXPO_CACHE: true
  GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"

jobs:
  lint-typecheck-test:
    name: 1. Lint, TypeCheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: 1.1 Checkout Code
        uses: actions/checkout@v4

      - name: 1.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 1.3 Install Dependencies
        run: npm ci --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci

      - name: 1.4 Lint
        run: npx eslint app src --max-warnings=0

      - name: 1.5 TypeScript Check
        run: npx tsc --noEmit --incremental

      - name: 1.6 Run Tests
        run: npm test -- --coverage --ci

  build-android:
    name: 2. Build Android APK (Optimized)
    needs: lint-typecheck-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ndk-version: [ '27.0.11902837' ]
    steps:
      - name: 2.1 Checkout Code
        uses: actions/checkout@v4

      - name: 2.2 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 2.3 Restore Cache (Gradle & NDK)
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.gradle/caches
            ${{ github.workspace }}/.gradle/wrapper
            ${{ github.workspace }}/.gradle/build-cache
            ~/.gradle
          key: gradle-android-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: 2.4 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 2.5 Install Dependencies
        run: npm ci --omit=dev --no-audit --prefer-offline --legacy-peer-deps 2>/dev/null || npm ci --omit=dev

      - name: 2.6 Setup NDK
        run: |
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ matrix.ndk-version }}" >> $ANDROID_HOME/local.properties
          export ANDROID_NDK=$ANDROID_HOME/ndk/${{ matrix.ndk-version }}
          if [ ! -d "$ANDROID_NDK" ]; then
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;${{ matrix.ndk-version }}"
          fi

      - name: 2.7 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN || '' }}

      - name: 2.8 Pre-build (Incremental)
        run: |
          if [ ! -d "node_modules" ]; then
            npx expo prebuild --platform android --non-interactive --clean
          else
            npx expo prebuild --platform android --non-interactive
          fi

      - name: 2.9 Build APK (Release)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --max-workers=4 \
            --build-cache

      - name: 2.10 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: productive-release-apk
          path: android/app/build/outputs/apk/release/
          retention-days: 30